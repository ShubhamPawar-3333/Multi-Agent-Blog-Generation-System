<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quillflow | Multi-Agent Blog Generation</title>
    <meta name="description"
        content="Quillflow — AI-powered blog generation with multi-agent pipeline and built-in quality assurance.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
</head>

<body>

    <!-- Floating Background Shapes -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- API Key Input (always visible, top-right) -->
    <div class="api-key-bar">
        <div class="api-key-wrapper">
            <span class="key-icon">🔑</span>
            <input type="password" id="apiKeyInput" placeholder="Groq API Key" autocomplete="off">
        </div>
    </div>

    <!-- STATE 1: Landing Page -->
    <div id="landingState" class="landing">
        <h1 class="app-title">Quillflow</h1>
        <p class="app-subtitle">Stop drafting. Start publishing. Quillflow's multi-agent pipeline writes, critiques,
            and
            refines your blog automatically.</p>

        <div class="input-group">
            <input type="text" id="topicInput" placeholder="Enter your blog topic..." autocomplete="off">
        </div>

        <div id="languageGroup" class="language-group hidden">
            <select id="languageSelect">
                <option value="">English (default)</option>
                <option value="hindi">Hindi</option>
                <option value="spanish">Spanish</option>
                <option value="french">French</option>
                <option value="german">German</option>
                <option value="japanese">Japanese</option>
            </select>
        </div>

        <button id="generateBtn" class="generate-btn" disabled>
            <span>✨ Generate Blog</span>
        </button>
    </div>

    <!-- STATE 2: Results Page -->
    <div id="resultsState" class="results hidden">

        <!-- Brand Header -->
        <div class="results-brand">
            <h1 class="brand-title">Quillflow</h1>
            <p class="brand-subtitle">Stop drafting. Start publishing.</p>
        </div>

        <!-- Compact Top Bar -->
        <div class="results-topbar">
            <div class="topic-tags">
                <span id="topicTag" class="tag"></span>
                <span id="langTag" class="tag"></span>
            </div>
            <button id="newBlogBtn" class="new-blog-btn">+ New Blog</button>
        </div>

        <!-- Two-Column Layout -->
        <div class="results-grid">

            <!-- Left: Blog Output -->
            <div class="blog-panel glass-card">
                <div class="blog-header">
                    <h2>Generated Blog</h2>
                    <button id="copyBtn" class="copy-btn">📋 Copy</button>
                </div>
                <div id="blogContent" class="blog-content">
                    <!-- Blog rendered here -->
                </div>
            </div>

            <!-- Right: Pipeline + Stats -->
            <div class="info-panel">

                <!-- Pipeline Progress -->
                <div class="pipeline-card glass-card">
                    <h3>Pipeline Progress</h3>
                    <div id="pipelineNodes" class="pipeline-nodes">
                        <!-- Nodes rendered by JS -->
                    </div>
                </div>

                <!-- Review Score -->
                <div class="review-card glass-card">
                    <h3>Quality Score</h3>
                    <div class="score-display">
                        <span id="reviewScore" class="score-number">--</span>
                        <span class="score-max">/10</span>
                    </div>
                    <p id="reviewFeedback" class="review-feedback"></p>
                </div>

                <!-- Stats -->
                <div class="stats-card glass-card">
                    <h3>Stats</h3>
                    <div class="stats-grid">
                        <div class="stat">
                            <span id="wordCount" class="stat-value">--</span>
                            <span class="stat-label">Words</span>
                        </div>
                        <div class="stat">
                            <span id="sectionCount" class="stat-value">--</span>
                            <span class="stat-label">Sections</span>
                        </div>
                        <div class="stat">
                            <span id="reviewCount" class="stat-value">--</span>
                            <span class="stat-label">Reviews</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>

</html>
